# Smoke test for the connect-deploy pipeline. Mirrors the deploy job's
# install + manifest steps against the fixture app (minus the git push), then
# runs the working-tree check-suggests and asserts the manifest. Proves the
# workflow installs declared deps and produces a manifest, exercises both
# manifest-inclusion paths the fixture demonstrates (a Suggests dep named in
# app code, and one named only in the scan-only dependencies.R helper), and
# guards the LinkingTo closure (websocket -> AsioHeaders) that pak prunes from
# binary installs unless PKG_INCLUDE_LINKINGTO keeps it.

on:
  pull_request:
    paths:
      - '.github/workflows/connect-deploy.yaml'
      - '.github/workflows/connect-smoke.yaml'
      - '.github/actions/check-suggests/**'
      - '.github/actions/tests/fixtures/connect-app/**'
  push:
    branches: [main]
    paths:
      - '.github/workflows/connect-deploy.yaml'
      - '.github/workflows/connect-smoke.yaml'
      - '.github/actions/check-suggests/**'
      - '.github/actions/tests/fixtures/connect-app/**'

name: connect-smoke

permissions:
  contents: read

jobs:

  smoke:

    runs-on: ubuntu-24.04

    env:
      FIXTURE: .github/actions/tests/fixtures/connect-app

    steps:

      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        env:
          PKG_INCLUDE_LINKINGTO: true
        with:
          working-directory: .github/actions/tests/fixtures/connect-app
          extra-packages: any::rsconnect

      - name: Generate manifest
        working-directory: .github/actions/tests/fixtures/connect-app
        run: Rscript -e 'rsconnect::writeManifest(appDir = ".")'

      - name: Check suggests
        uses: ./.github/actions/check-suggests
        with:
          content-dir: .github/actions/tests/fixtures/connect-app

      - name: Assert manifest contents
        working-directory: .github/actions/tests/fixtures/connect-app
        shell: Rscript {0}
        run: |
          stopifnot(file.exists("manifest.json"))

          m <- jsonlite::fromJSON("manifest.json", simplifyVector = FALSE)
          pkgs <- names(m$packages)
          cat("manifest packages:", paste(sort(pkgs), collapse = ", "), "\n")

          # AsioHeaders is the LinkingTo regression marker: websocket's
          # LinkingTo dep, pruned by binary installs, present only because
          # PKG_INCLUDE_LINKINGTO kept it. Without that, writeManifest's renv
          # snapshot aborts before this step ever runs.
          missing <- setdiff(
            c("shiny", "jsonlite", "glue", "websocket", "AsioHeaders"), pkgs
          )
          if (length(missing)) {
            stop("manifest missing expected packages: ",
                 paste(missing, collapse = ", "))
          }

      # Guards the connect-repos lever: with renv's PPM rewrite off and the repo
      # overridden, the manifest must record that exact binary URL verbatim —
      # what makes a verbatim-restoring Connect install binaries. Runs over
      # setup-r's noble RENV_CONFIG_REPOS_OVERRIDE, proving the override takes.
      - name: Assert connect-repos pins the literal binary repo
        working-directory: .github/actions/tests/fixtures/connect-app
        shell: Rscript {0}
        env:
          CONNECT_REPOS: https://packagemanager.posit.co/cran/__linux__/centos8/latest
        run: |
          connect_repos <- Sys.getenv("CONNECT_REPOS")
          Sys.setenv(
            RENV_CONFIG_PPM_ENABLED = "FALSE",
            RENV_CONFIG_REPOS_OVERRIDE = connect_repos
          )
          options(repos = c(CRAN = connect_repos))
          rsconnect::writeManifest(appDir = ".")

          m <- jsonlite::fromJSON("manifest.json", simplifyVector = FALSE)
          repos <- unique(unlist(lapply(m$packages, `[[`, "Repository")))
          if (!connect_repos %in% repos) {
            stop("manifest did not record the connect-repos URL; repos seen: ",
                 paste(repos, collapse = ", "))
          }
          cat("connect-repos OK: manifest records", connect_repos, "\n")
