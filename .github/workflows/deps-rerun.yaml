# Re-run smoke/revdep jobs when the ```deps block in a PR body changes
#
# Usage — consumer repo .github/workflows/deps-rerun.yaml:
#
#   on:
#     pull_request:
#       branches: main
#       types: [edited]
#
#   name: deps-rerun
#
#   jobs:
#     rerun:
#       uses: cynkra/blockr.ci/.github/workflows/deps-rerun.yaml@main
#       secrets:
#         BLOCKR_PAT: ${{ secrets.BLOCKR_PAT }}
#
# Pass secrets by name. `secrets: inherit` does not forward secrets
# across organisations — the inherited values silently arrive blank in
# the called job.

on:
  pull_request:
    branches: main
    types: [edited]
  workflow_call:
    secrets:

      BLOCKR_PAT:
        description: >
          PAT used for authenticated GitHub API calls when re-running
          jobs.  Falls back to github.token when not provided.
        required: false

name: deps-rerun

jobs:

  rerun-deps:

    if: github.event.changes.body

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: cynkra/blockr.ci/.github/actions/rerun-deps@main
        with:
          old-body: ${{ github.event.changes.body.from }}
          new-body: ${{ github.event.pull_request.body }}
          sha: ${{ github.event.pull_request.head.sha }}
          repo: ${{ github.repository }}
          token: ${{ secrets.BLOCKR_PAT || github.token }}
