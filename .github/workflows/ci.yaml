# Centralised CI pipeline for blockr.* packages
#
# Usage — consumer repo .github/workflows/ci.yaml:
#
#   on:
#     push:
#       branches: main
#     pull_request:
#     merge_group:
#
#   name: ci
#
#   jobs:
#     ci:
#       uses: cynkra/blockr.ci/.github/workflows/ci.yaml@main
#       secrets:
#         CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
#         BLOCKR_PAT: ${{ secrets.BLOCKR_PAT }}
#       permissions:
#         contents: write
#
# Pass secrets by name. `secrets: inherit` does not forward secrets
# across organisations (e.g. BristolMyersSquibb/* calling this workflow
# in cynkra/blockr.ci) — the inherited values silently arrive blank in
# the called job.
#
# Reverse-dependency checks live in a separate reusable workflow
# (revdep.yaml).  Consumers with downstream packages to check add a second
# jobs: entry — see revdep.yaml for usage.

on:
  push:
    branches: main
  pull_request:
  merge_group:
  workflow_call:
    inputs:

      lintr-exclusions:
        description: >
          Newline-separated file paths to exclude from linting.
        type: string
        default: ''
        required: false

      skip-pkgdown:
        description: >
          Set to true to skip the pkgdown job.  Useful for packages that
          build their site differently (e.g. Quarto).
        type: boolean
        default: false
        required: false

      revdep-packages:
        description: >
          DEPRECATED.  Reverse-dependency checks moved to revdep.yaml;
          this input is now a no-op and will be removed once all
          consumers have migrated.  See revdep.yaml for the new usage.
        type: string
        default: ''
        required: false

    secrets:

      CODECOV_TOKEN:
        description: >
          Codecov upload token.  Required for authenticated coverage
          uploads; without it Codecov falls back to tokenless uploads
          which are subject to aggressive rate-limiting.
        required: false

      BLOCKR_PAT:
        description: >
          PAT used for authenticated GitHub API calls in dependency
          resolution.  Falls back to github.token when not provided.
        required: false

name: ci

jobs:

  # ── Lint ──────────────────────────────────────────────────────────────

  lint:

    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.BLOCKR_PAT || github.token }}

    steps:
      - name: Warn on deprecated revdep-packages input
        if: inputs.revdep-packages != ''
        run: |
          echo "::warning::The 'revdep-packages' input on ci.yaml is deprecated and no longer triggers reverse-dependency checks. Migrate by dropping it from the ci.yaml call and adding a second jobs entry pointing at revdep.yaml (gated with 'if: github.event_name == \"merge_group\"'). See cynkra/blockr.ci#9."

      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: cynkra/blockr.ci/.github/actions/parse-deps@main
        id: deps
        with:
          pr-body: ${{ github.event.pull_request.body }}
          pr-number: ${{ github.event.pull_request.number }}
          base-packages: |
            any::lintr
            local::.

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: ${{ steps.deps.outputs.extra-packages }}
          needs: lint

      - name: Write lintr config
        if: ${{ hashFiles('.lintr') == '' }}
        env:
          LINTR_EXCLUSIONS: ${{ inputs.lintr-exclusions }}
        shell: Rscript {0}
        run: |
          excl <- Sys.getenv("LINTR_EXCLUSIONS")
          paths <- if (nzchar(excl)) trimws(strsplit(excl, "[,\n]")[[1]]) else character()
          paths <- paths[nzchar(paths)]

          cfg <- "linters: linters_with_defaults(\n  object_name_linter = NULL\n  )"
          if (length(paths)) {
            items <- paste0('  "', paths, '"', collapse = ",\n")
            cfg <- paste0(cfg, "\nexclusions: list(\n", items, "\n  )")
          }
          writeLines(cfg, ".lintr")

      - name: Lint
        run: lintr::lint_package()
        shell: Rscript {0}
        env:
          LINTR_ERROR_ON_LINT: true

  # ── Smoke test (single-platform quick check, PR gate) ────────────────

  smoke:

    needs: lint

    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.BLOCKR_PAT || github.token }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: cynkra/blockr.ci/.github/actions/parse-deps@main
        id: deps
        with:
          pr-body: ${{ github.event.pull_request.body }}
          pr-number: ${{ github.event.pull_request.number }}
          base-packages: |
            any::rcmdcheck
            local::.

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: ${{ steps.deps.outputs.extra-packages }}
          needs: check

      - name: Remove mermaid config for CI
        run: Rscript -e 'unlink("vignettes/_metadata.yml")'

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true

  # ── Full R CMD check (multi-platform, merge queue + push) ─────────────

  check:

    needs: smoke

    if: github.event_name != 'pull_request'

    runs-on: ${{ matrix.config.os }}

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,  r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,  r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.BLOCKR_PAT || github.token }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: cynkra/blockr.ci/.github/actions/parse-deps@main
        id: deps
        with:
          pr-body: ${{ github.event.pull_request.body }}
          pr-number: ${{ github.event.pull_request.number }}
          base-packages: |
            any::rcmdcheck
            local::.

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: ${{ steps.deps.outputs.extra-packages }}
          needs: check

      - name: Remove mermaid config for CI
        run: Rscript -e 'unlink("vignettes/_metadata.yml")'

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true

  # ── Test coverage ────────────────────────────────────────────────────

  coverage:

    needs: smoke

    if: github.event_name != 'pull_request'

    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.BLOCKR_PAT || github.token }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: cynkra/blockr.ci/.github/actions/parse-deps@main
        id: deps
        with:
          pr-body: ${{ github.event.pull_request.body }}
          pr-number: ${{ github.event.pull_request.number }}
          base-packages: |
            any::covr

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: ${{ steps.deps.outputs.extra-packages }}
          needs: coverage

      - name: Test coverage
        run: |
          covr::codecov(
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(Sys.getenv("RUNNER_TEMP"), "package")
          )
        shell: Rscript {0}

      - name: Show testthat output
        if: always()
        run: |
          find ${{ runner.temp }}/package -name 'testthat.Rout*' -exec cat '{}' \; || true
        shell: bash

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-test-failures
          path: ${{ runner.temp }}/package

  # ── pkgdown site ─────────────────────────────────────────────────────

  pkgdown:

    needs: smoke

    if: >-
      !inputs.skip-pkgdown &&
      github.event_name != 'pull_request'

    runs-on: ubuntu-latest

    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}

    env:
      GITHUB_PAT: ${{ secrets.BLOCKR_PAT || github.token }}

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: cynkra/blockr.ci/.github/actions/parse-deps@main
        id: deps
        with:
          pr-body: ${{ github.event.pull_request.body }}
          pr-number: ${{ github.event.pull_request.number }}
          base-packages: |
            any::pkgdown
            local::.

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: ${{ steps.deps.outputs.extra-packages }}
          needs: website

      - name: Remove mermaid config for CI
        run: Rscript -e 'unlink("vignettes/_metadata.yml")'

      - name: Build site
        run: pkgdown::build_site_github_pages(new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Deploy to GitHub pages
        if: github.event_name == 'push'
        uses: JamesIves/github-pages-deploy-action@v4.8.0
        with:
          clean: false
          branch: gh-pages
          folder: docs
