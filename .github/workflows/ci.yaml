# Centralised CI pipeline for blockr.* packages
#
# Usage — consumer repo .github/workflows/ci.yaml:
#
#   on:
#     pull_request:
#     merge_group:
#
#   name: ci
#
#   jobs:
#     ci:
#       uses: BristolMyersSquibb/blockr.ci/.github/workflows/ci.yaml@main
#       secrets:
#         CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
#         BLOCKR_PAT: ${{ secrets.BLOCKR_PAT }}
#
# Pass secrets by name. `secrets: inherit` does not forward secrets
# across organisations (e.g. BristolMyersSquibb/* calling this workflow
# in BristolMyersSquibb/blockr.ci) — the inherited values silently arrive blank in
# the called job.
#
# PR jobs (lint, smoke, pkgdown-dev, coverage) run in parallel and gate
# the PR.  The merge-queue gate is `check-all`, which aggregates the
# multi-platform `check` matrix; the queue runs only the check matrix
# and skips the PR-side jobs.  Required-status-checks list:
#
#   ci / lint
#   ci / smoke
#   ci / pkgdown-dev
#   ci / coverage
#   ci / check-all
#
# Skipped jobs satisfy required checks, so the queue accepts the PR-only
# rows as skipped on merge_group refs.
#
# A deploy app runs on exactly one R version (whatever Posit Connect
# serves).  Pass `r-version:` (e.g. "4.4.2") so the PR-leg jobs — notably
# the smoke R CMD check — run on that version instead of `release`.  The
# merge-queue `check` matrix is unaffected and keeps its cross-platform
# release/devel/oldrel spread.
#
# pkgdown site deploy lives in a separate reusable workflow
# (pkgdown.yaml).  Consumers that want a deployed site add a second
# workflow file calling pkgdown.yaml on `push: branches: main`.
#
# Reverse-dependency checks also live in a separate reusable workflow
# (revdep.yaml).  Consumers with downstream packages to check add a
# second jobs: entry — see revdep.yaml for usage.

on:
  pull_request:
  merge_group:
  workflow_call:
    inputs:

      lintr-exclusions:
        description: >
          Newline-separated file paths to exclude from linting.
        type: string
        default: ''
        required: false

      coverage-threshold:
        description: >
          Minimum coverage percentage required for the coverage job to
          pass.  Default 0 disables the gate; coverage is still computed
          and uploaded to Codecov.
        type: number
        default: 0
        required: false

      r-version:
        description: >
          R version for the PR-leg jobs (lint, smoke, pkgdown-dev,
          coverage).  Default '' runs them on 'release'.  Set it (e.g.
          '4.4.2') for a deploy app that runs on exactly one R version,
          so its PR checks — notably the smoke R CMD check — exercise the
          deployment target.  The merge-queue check matrix is unaffected
          and keeps its cross-platform release/devel/oldrel spread.
        type: string
        default: ''
        required: false

      skip-pkgdown:
        description: >
          DEPRECATED.  The pkgdown job moved out of ci.yaml into a
          separate pkgdown.yaml reusable workflow; this input is now a
          no-op and will be removed once all consumers have migrated.
          Consumers opt in by adding a pkgdown.yaml workflow rather
          than by gating ci.yaml.
        type: boolean
        default: false
        required: false

      revdep-packages:
        description: >
          DEPRECATED.  Reverse-dependency checks moved to revdep.yaml;
          this input is now a no-op and will be removed once all
          consumers have migrated.  See revdep.yaml for the new usage.
        type: string
        default: ''
        required: false

    secrets:

      CODECOV_TOKEN:
        description: >
          Codecov upload token.  Required for authenticated coverage
          uploads; without it Codecov falls back to tokenless uploads
          which are subject to aggressive rate-limiting.
        required: false

      BLOCKR_PAT:
        description: >
          PAT used for authenticated GitHub API calls in dependency
          resolution.  Falls back to github.token when not provided.
        required: false

name: ci

jobs:

  # ── Lint (PR gate) ───────────────────────────────────────────────────

  lint:

    if: github.event_name == 'pull_request'

    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.BLOCKR_PAT || github.token }}

    steps:
      - name: Warn on deprecated revdep-packages input
        if: inputs.revdep-packages != ''
        run: |
          echo "::warning::The 'revdep-packages' input on ci.yaml is deprecated and no longer triggers reverse-dependency checks. Migrate by dropping it from the ci.yaml call and adding a second jobs entry pointing at revdep.yaml (gated with 'if: github.event_name == \"merge_group\"'). See BristolMyersSquibb/blockr.ci#9."

      - name: Warn on deprecated skip-pkgdown input
        if: inputs.skip-pkgdown
        run: |
          echo "::warning::The 'skip-pkgdown' input on ci.yaml is deprecated. The pkgdown job moved into pkgdown.yaml; consumers opt in by adding a pkgdown.yaml workflow rather than gating ci.yaml. See BristolMyersSquibb/blockr.ci#17."

      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ inputs.r-version || 'release' }}
          use-public-rspm: true

      - uses: BristolMyersSquibb/blockr.ci/.github/actions/parse-deps@main
        id: deps
        with:
          pr-body: ${{ github.event.pull_request.body }}
          pr-number: ${{ github.event.pull_request.number }}
          base-packages: |
            any::lintr
            local::.

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: ${{ steps.deps.outputs.extra-packages }}
          needs: lint

      - name: Write lintr config
        if: ${{ hashFiles('.lintr') == '' }}
        env:
          LINTR_EXCLUSIONS: ${{ inputs.lintr-exclusions }}
        shell: Rscript {0}
        run: |
          excl <- Sys.getenv("LINTR_EXCLUSIONS")
          paths <- if (nzchar(excl)) trimws(strsplit(excl, "[,\n]")[[1]]) else character()
          paths <- paths[nzchar(paths)]

          cfg <- "linters: linters_with_defaults(\n  object_name_linter = NULL\n  )"
          if (length(paths)) {
            items <- paste0('  "', paths, '"', collapse = ",\n")
            cfg <- paste0(cfg, "\nexclusions: list(\n", items, "\n  )")
          }
          writeLines(cfg, ".lintr")

      - name: Lint
        run: lintr::lint_package()
        shell: Rscript {0}
        env:
          LINTR_ERROR_ON_LINT: true

  # ── Smoke test (single-platform quick check, PR gate) ────────────────

  smoke:

    if: github.event_name == 'pull_request'

    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.BLOCKR_PAT || github.token }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ inputs.r-version || 'release' }}
          use-public-rspm: true

      - uses: BristolMyersSquibb/blockr.ci/.github/actions/parse-deps@main
        id: deps
        with:
          pr-body: ${{ github.event.pull_request.body }}
          pr-number: ${{ github.event.pull_request.number }}
          base-packages: |
            any::rcmdcheck
            local::.

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: ${{ steps.deps.outputs.extra-packages }}
          needs: check

      - name: Remove mermaid config for CI
        run: Rscript -e 'unlink("vignettes/_metadata.yml")'

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true

  # ── pkgdown dev build (PR gate, no deploy) ───────────────────────────

  pkgdown-dev:

    if: github.event_name == 'pull_request'

    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.BLOCKR_PAT || github.token }}

    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ inputs.r-version || 'release' }}
          use-public-rspm: true

      - uses: BristolMyersSquibb/blockr.ci/.github/actions/parse-deps@main
        id: deps
        with:
          pr-body: ${{ github.event.pull_request.body }}
          pr-number: ${{ github.event.pull_request.number }}
          base-packages: |
            any::pkgdown
            any::pkgload
            local::.

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: ${{ steps.deps.outputs.extra-packages }}
          needs: website

      - name: Remove mermaid config for CI
        run: Rscript -e 'unlink("vignettes/_metadata.yml")'

      - name: Build site (devel)
        run: pkgdown::build_site(devel = TRUE, new_process = FALSE, install = FALSE)
        shell: Rscript {0}

      - name: Upload built site
        uses: actions/upload-artifact@v6
        with:
          name: pkgdown-site
          path: docs/
          if-no-files-found: error

  # ── Test coverage (PR gate, optional threshold) ──────────────────────

  coverage:

    if: github.event_name == 'pull_request'

    runs-on: ubuntu-latest

    env:
      GITHUB_PAT: ${{ secrets.BLOCKR_PAT || github.token }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ inputs.r-version || 'release' }}
          use-public-rspm: true

      - uses: BristolMyersSquibb/blockr.ci/.github/actions/parse-deps@main
        id: deps
        with:
          pr-body: ${{ github.event.pull_request.body }}
          pr-number: ${{ github.event.pull_request.number }}
          base-packages: |
            any::covr

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: ${{ steps.deps.outputs.extra-packages }}
          needs: coverage

      - name: Compute, upload and gate coverage
        shell: Rscript {0}
        env:
          COVERAGE_THRESHOLD: ${{ inputs.coverage-threshold }}
        run: |
          cov <- covr::package_coverage(
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(Sys.getenv("RUNNER_TEMP"), "package")
          )

          pct <- covr::percent_coverage(cov)
          cat(sprintf("Coverage: %.2f%%\n", pct))

          covr::codecov(coverage = cov)

          threshold_env <- Sys.getenv("COVERAGE_THRESHOLD")
          threshold <- if (nzchar(threshold_env)) as.numeric(threshold_env) else 0
          if (pct < threshold) {
            stop(sprintf(
              "Coverage %.2f%% below threshold %.2f%%",
              pct, threshold
            ))
          }

      - name: Show testthat output
        if: always()
        run: |
          find ${{ runner.temp }}/package -name 'testthat.Rout*' -exec cat '{}' \; || true
        shell: bash

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: coverage-test-failures
          path: ${{ runner.temp }}/package

  # ── Full R CMD check (multi-platform, merge queue gate) ──────────────

  check:

    if: github.event_name != 'pull_request'

    runs-on: ${{ matrix.config.os }}

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,  r: 'devel', http-user-agent: 'release'}
          - {os: ubuntu-latest,  r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.BLOCKR_PAT || github.token }}
      R_KEEP_PKG_SOURCE: yes

    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: BristolMyersSquibb/blockr.ci/.github/actions/parse-deps@main
        id: deps
        with:
          pr-body: ${{ github.event.pull_request.body }}
          pr-number: ${{ github.event.pull_request.number }}
          base-packages: |
            any::rcmdcheck
            local::.

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: ${{ steps.deps.outputs.extra-packages }}
          needs: check

      - name: Remove mermaid config for CI
        run: Rscript -e 'unlink("vignettes/_metadata.yml")'

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true

  # ── Aggregate check-matrix result for the required-checks list ───────
  #
  # `check-all` shields the merge-queue gate from changes to the matrix
  # shape: required_status_checks lists this name instead of each
  # platform/R-version entry.  Treats `skipped` (PR runs, where the
  # matrix doesn't fire) as success.

  check-all:

    needs: check
    if: always()

    runs-on: ubuntu-latest

    steps:
      - name: Aggregate check matrix
        env:
          CHECK_RESULT: ${{ needs.check.result }}
        run: |
          echo "check matrix result: $CHECK_RESULT"
          case "$CHECK_RESULT" in
            success|skipped) exit 0 ;;
            *) exit 1 ;;
          esac
