name: Action tests

on:
  push:
    branches: [main]
    paths:
      - '.github/actions/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/actions/**'

jobs:
  bats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Install action-test R dependencies
        run: Rscript -e 'install.packages(c("pkgdepends", "jsonlite"))'

      - name: Run bats tests
        run: .github/actions/tests/bats/bin/bats .github/actions/tests/
